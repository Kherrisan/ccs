name: Bug report
description: Report a reproducible problem in the CLI, dashboard, config flow, or packaging.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Keep the report concrete and reproducible.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Pick the closest area.
      options:
        - CLI runtime
        - Dashboard UI
        - Config or auth flow
        - Provider integration
        - Install or packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What broke?
      description: Brief summary of the problem.
      placeholder: Running `ccs config --host 0.0.0.0` prints the wrong reachable URL on macOS.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact steps, commands, inputs, and settings needed to reproduce.
      placeholder: |
        1. Run `ccs ...`
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CCS version
      description: Output of `ccs --version`
      placeholder: 7.54.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include Node.js version, Bun version, shell, terminal, and anything else relevant.
      placeholder: |
        Node.js:
        Bun:
        Shell:
        Terminal:
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or terminal output
      description: Redact tokens, cookies, email addresses, and any private config before posting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues first.
          required: true
        - label: I removed secrets and private data from logs/screenshots.
          required: true
        - label: I can still reproduce this on the latest released or dev build.
          required: false
